<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I love you milanyaaa 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;rect width='100' height='100' fill='pink'/&gt;&lt;text x='50' y='50' font-size='60' text-anchor='middle' dominant-baseline='middle'&gt;❤️&lt;/text&gt;&lt;/svg&gt;">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #4A0E0E 0%, #6B1423 25%, #800020 50%, #6B1423 75%, #4A0E0E 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING HEARTS */
        .floats-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .float-item {
            position: absolute;
            bottom: -80px;
            opacity: 0;
            animation: floatUp 14s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255,182,193,0.8));
            white-space: nowrap;
            color: #FFE5EC; 
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            10%  { opacity: 0.9; }
            50%  { opacity: 0.8; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-110vh) rotate(20deg) scale(1.2); opacity: 0; }
        }

        /* LOGIN BOX CONTAINER */
        .login-container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        /* CONTENT INSIDE BOX */
        .login-content {
            padding: 30px 25px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 182, 193, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .photo-circle-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 14px;
        }
        .photo-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid rgba(255,182,193,0.5);
            box-shadow: 0 0 0 3px rgba(255,182,193,0.3), 0 8px 25px rgba(0,0,0,0.4);
            overflow: hidden;
            animation: photoGlow 3s ease-in-out infinite alternate;
        }
        @keyframes photoGlow {
            0%   { box-shadow: 0 0 0 3px rgba(255,182,193,0.3), 0 8px 25px rgba(0,0,0,0.3); }
            100% { box-shadow: 0 0 0 6px rgba(255,182,193,0.8), 0 8px 30px rgba(0,0,0,0.5); }
        }
        .photo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .login-title {
            font-size: 1.9em;
            color: #FFE5EC;
            font-weight: 900;
            margin-bottom: 4px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
        }
        .login-subtitle {
            font-size: 0.95em;
            color: #FFD1DC;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .error-msg {
            background: rgba(255,100,100,0.15);
            border: 2px solid rgba(255,100,100,0.3);
            color: #cc0000;
            padding: 10px;
            border-radius: 12px;
            margin: 14px 0;
            font-size: 0.9em;
            display: none;
        }

        .input-group { margin-bottom: 16px; }
        .input-group input {
            width: 80%;
            padding: 12px 15px;
            border: 2px solid rgba(255,182,193,0.4);
            border-radius: 14px;
            font-size: 1.4em;
            font-weight: 900;
            background: rgba(255,255,255,0.15);
            color: #FFE5EC;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .input-group input:focus {
            outline: none;
            border-color: #FFB6C1;
            background: rgba(255,255,255,0.25);
            box-shadow: 0 5px 20px rgba(255,182,193,0.5);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #800020, #6B1423);
            border: 3px solid rgba(255,182,193,0.3);
            border-radius: 14px;
            color: #FFE5EC;
            font-size: 1.15em;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
        }
        .login-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        @media (max-width: 768px) {
            .login-container { max-width: 380px; }
            .photo-circle { width: 80px; height: 80px; }
            .login-title { font-size: 1.5em; }
        }
        @media (max-width: 480px) {
            .login-container { max-width: 310px; }
        }
    </style>
</head>
<body>

    <div class="floats-container" id="floatsContainer"></div>

    <div class="login-container">
        <div class="login-content">
            <div class="photo-circle-wrap">
                <div class="photo-circle">
                    <img src="IMG-20260329-WA0064.jpg" alt="photo">
                </div>
            </div>
            
            <h1 class="login-title">هعععععععع 😘😘😘😘😘😘 </h1>
            <p class="login-subtitle">my everything ❤</p>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="الباسورد 🙈" autocomplete="off">
            </div>
            
            <button id="unlockBtn" class="login-btn">💕 Unlock 💕</button>
            
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        // ==================== إعدادات الأمان والباسورد ====================
        const correctPassword = "love you tona";

        const passwordInput = document.getElementById('password');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loginContainer = document.querySelector('.login-container');

        // ===== 1. مصفوفة الكلمات بمختلف اللغات والمحافظة على الإيموجيز =====
        const loveWords = [
            'بحبك',          // العربية
            'I love you',    // الإنجليزية
            'Je t\'aime',    // الفرنسية
            'Te amo',        // الإسبانية
            'Ti amo',        // الإيطالية
            'Ich liebe dich',// الألمانية
            'Seni seviyorum',// التركية
            'Я тебя люблю',  // الروسية
            '사랑해',        // الكورية
            '愛してる',       // اليابانية
            '我爱你'         // الصينية
        ];
        
        const heartIcons = ['❤️','💗','💕','💖','😘','💓','💞'];

        // ===== دالة توليد العناصر العائمة =====
        function createFloatingHeart() {
            const container = document.getElementById('floatsContainer');
            if(!container) return;
            
            const el = document.createElement('div');
            el.className = 'float-item';
            
            const randomWord = loveWords[Math.floor(Math.random() * loveWords.length)];
            const randomHeart = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            el.textContent = `${randomWord} ${randomHeart}`;
            
            el.style.left = Math.random() * 90 + '%'; 
            el.style.fontSize = (18 + Math.random() * 10) + 'px'; 
            el.style.animationDuration = (10 + Math.random() * 6) + 's';
            el.style.animationDelay = Math.random() * 1.5 + 's';
            container.appendChild(el);
            
            setTimeout(() => el.remove(), 15000);
        }

        setInterval(() => {
            for (let i = 0; i < 2; i++) { createFloatingHeart(); }
        }, 1200);

        // ===== 2. نظام انفجار القلوب =====
        function triggerTapExplosion(x, y) {
            for(let i=0; i<6; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-burst';
                heart.textContent = heartIcons[Math.floor(Math.random()*heartIcons.length)];
                heart.style.position = 'fixed';
                heart.style.zIndex = '9999';
                heart.style.pointerEvents = 'none';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 50;
                
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                
                heart.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 700,
                    easing: 'ease-out'
                });
                
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 700);
            }
        }

        document.addEventListener('click', (e) => {
            if(e.target === passwordInput || e.target === unlockBtn) return;
            triggerTapExplosion(e.clientX, e.clientY);
        });

        // ===== 3. فحص الصلاحية والدخول في نفس التاب =====
        function unlockHeart() {
            const enteredPass = passwordInput.value.trim();

            if (enteredPass === correctPassword) {
                errorMsg.style.display = 'none';
                
                loginContainer.style.transition = 'all 1.2s cubic-bezier(0.6, -0.28, 0.735, 0.045)';
                loginContainer.style.opacity = '0';
                loginContainer.style.transform = 'scale(0.5) rotate(-10deg)';

                setTimeout(() => {
                    // يفتح في نفس الصفحة تماماً وبدون تابات جديدة
                    window.location.href = "memories.html"; 
                }, 1200);
            } else {
                errorMsg.textContent = "الباسورد غلط يا قلبي 😔 جرب تاني";
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();

                loginContainer.style.transition = 'transform 80ms ease';
                loginContainer.style.transform = 'translateX(12px)';
                setTimeout(() => loginContainer.style.transform = 'translateX(-12px)', 80);
                setTimeout(() => loginContainer.style.transform = 'translateX(10px)', 160);
                setTimeout(() => loginContainer.style.transform = 'translateX(-10px)', 240);
                setTimeout(() => loginContainer.style.transform = 'translateX(0)', 320);
            }
        }

        unlockBtn.addEventListener('click', unlockHeart);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { unlockHeart(); }
        });

        document.addEventListener('DOMContentLoaded', () => {
            for (let i = 0; i < 4; i++) { createFloatingHeart(); }
        });

        // ===== 4. حل مشكلة الصفحة البيضاء عند الرجوع بزرار المتصفح (Back) =====
        window.addEventListener('pageshow', function (event) {
            // إعادة تصفير الأبعاد وتفريغ خانة كلمة السر لتكون الصفحة جاهزة مجدداً
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                loginContainer.style.transition = 'none';
                loginContainer.style.opacity = '1';
                loginContainer.style.transform = 'scale(1) rotate(0deg)';
                passwordInput.value = '';
                errorMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>
